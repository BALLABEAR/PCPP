id: cloudcompare_meshing
name: CloudCompareMeshing
task_type: meshing
description: >
  External-tool adapter for CloudCompare CLI.
  Runs non-neural meshing/preprocessing operations in the same worker contract.
input_format: [.ply, .xyz, .txt, .pts, .npy, .pcd, .las, .laz]
output_format: [.ply]
accepted_input_formats: [.ply, .xyz, .txt, .pts, .npy, .pcd, .las, .laz]
produced_output_formats: [.ply]
preferred_output_format: .ply
gpu_required: false
batching_mode: disabled
speed: medium
quality: medium
params:
  cloudcompare_exe:
    type: str
    default: CloudCompare
    description: executable name or full path
  strict_cli:
    type: bool
    default: false
    description: fail instead of passthrough fallback when CLI is unavailable
