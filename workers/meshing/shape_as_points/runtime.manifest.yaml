version: 1
base_image: nvidia/cuda:11.8.0-cudnn8-runtime-ubuntu22.04
system_packages:
- python3
- python3-pip
- python3-dev
- build-essential
- git
- ffmpeg
- libgl1
- libglib2.0-0
- libx11-6
- libxext6
- libxrender1
- libsm6
python:
  pip_commands:
  - python -m pip install --no-cache-dir --upgrade pip setuptools wheel
  - python -m pip install --no-cache-dir pyyaml
  - python -m pip install --no-cache-dir torch==2.1.2 torchvision==0.16.2 --index-url
    https://download.pytorch.org/whl/cu118
  pip:
  - numpy<2
  - trimesh
  - plyfile
  - scikit-image
  - open3d
  - opencv-python
  - pykdtree
  - tensorboard
  - ipdb
  pip_requirements_files: []
  pip_extra_args: []
build_steps:
- python -m pip install --no-cache-dir --no-build-isolation --timeout 120 --retries
  20 torch-scatter==2.1.2
- python -m pip install --no-cache-dir --timeout 120 --retries 20 pytorch3d==0.7.5
  -f https://dl.fbaipublicfiles.com/pytorch3d/packaging/wheels/py310_cu118_pyt211/download.html
- python -m pip install --no-cache-dir --timeout 120 --retries 20 libigl==2.5.1 ||
  python -m pip install --no-cache-dir --timeout 120 --retries 20 libigl
env:
  PYTHONUNBUFFERED: '1'
  MKL_THREADING_LAYER: GNU
