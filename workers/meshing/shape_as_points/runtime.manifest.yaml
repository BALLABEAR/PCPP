version: 1
base_image: nvidia/cuda:11.8.0-cudnn8-runtime-ubuntu22.04
system_packages:
  - python3
  - python3-pip
  - python3-dev
  - build-essential
  - git
  - ffmpeg
  - libgl1
  - libglib2.0-0
  - libx11-6
  - libxext6
  - libxrender1
  - libsm6
python:
  pip_commands:
    - python -m pip install --no-cache-dir --upgrade pip setuptools wheel
    - python -m pip install --no-cache-dir pyyaml
    - python -m pip install --no-cache-dir numpy==1.26.4 scipy==1.10.1 pandas==2.2.2 tqdm==4.66.4
    - python -m pip install --no-cache-dir open3d==0.18.0 trimesh==4.4.9 plyfile==1.0.3 scikit-image==0.22.0 imageio==2.34.1
    - python -m pip install --no-cache-dir opencv-python-headless==4.10.0.84 pykdtree==1.3.12 tensorboard==2.15.2 ipdb==0.13.13
    - python -m pip install --no-cache-dir libigl==2.5.1 || python -m pip install --no-cache-dir libigl
    - python -m pip install --no-cache-dir torch-scatter -f https://data.pyg.org/whl/torch-2.1.2+cu118.html
    - python -m pip install --no-cache-dir pytorch3d==0.7.5 -f https://dl.fbaipublicfiles.com/pytorch3d/packaging/wheels/py310_cu118_pyt211/download.html
build_steps: []
env:
  MKL_THREADING_LAYER: GNU
  PYTHONUNBUFFERED: "1"
  RUNTIME_CMD_RETRIES: "3"
  RUNTIME_CMD_RETRY_DELAY_SEC: "15"
