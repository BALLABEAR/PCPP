  Stage 3 scaffold for point cloud completion.
  Replace stub logic in worker.py with real model inference from GitHub repository.
input_format: [.ply, .pcd, .xyz, .pts]
output_format: [.ply]
min_points: 512
max_points: 16384
gpu_required: true
gpu_memory_mb: 4000
