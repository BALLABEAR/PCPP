id: snowflake_net
name: SnowflakeNet
task_type: completion
description: >
  PCPP wrapper for external SnowflakeNet repository.
  Supports passthrough smoke mode and model mode with real checkpoint inference.
input_format: [.xyz, .txt, .npy]
output_format: [.xyz]
min_points: 512
max_points: 16384
gpu_required: true
gpu_memory_mb: 4000
max_points_per_batch: 2048
batching_mode: auto
speed: slow
quality: high
paper_url: https://arxiv.org/abs/2109.04410
github_url: https://github.com/AllenXiangX/SnowflakeNet
params:
  mode:
    type: str
    default: passthrough
    description: passthrough or model
  weights_path:
    type: str
    default: ""
    description: path to ckpt-best.pth for model mode
  config_path:
    type: str
    default: ""
    description: optional yaml config from SnowflakeNet completion/configs
  device:
    type: str
    default: cuda
    description: cuda or cpu
